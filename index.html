<title>COSROAD 코스로드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1A6BFF;--primary-light:#E8F0FF;
  --success:#12B76A;--success-light:#ECFDF3;
  --danger:#F04438;--danger-light:#FEF3F2;
  --warning:#F79009;--warning-light:#FFFAEB;
  --admin:#7C3AED;--admin-light:#F3EEFF;
  --gray-100:#F2F4F7;--gray-200:#EAECF0;
  --gray-400:#98A2B3;--gray-600:#475467;
  --gray-700:#344054;--gray-900:#101828;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--gray-100);min-height:100vh;color:var(--gray-900);padding-bottom:80px;}

/* 로그인 */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#EA580C 0%,#C2410C 100%);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.login-screen.hide{display:none;}
.login-logo{font-size:52px;margin-bottom:10px;}
.login-title{font-size:22px;font-weight:800;color:white;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:28px;}
.login-card{background:white;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-section-title{font-size:13px;font-weight:700;color:var(--gray-600);margin-bottom:10px;margin-top:14px;}
.login-section-title:first-child{margin-top:0;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;outline:none;margin-bottom:8px;}
.login-input:focus{border-color:var(--primary);}
.login-btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:6px;}
.btn-driver{background:var(--primary);color:white;}
.btn-admin{background:var(--admin);color:white;}
.login-err{color:var(--danger);font-size:12px;text-align:center;margin-top:4px;display:none;}
.login-hint{font-size:11px;color:rgba(255,255,255,0.6);margin-top:14px;}

/* 헤더 */
.header{background:white;padding:14px 16px 10px;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100;}
.header.admin-mode{border-bottom:3px solid var(--admin);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.header-title{font-size:17px;font-weight:800;display:flex;align-items:center;gap:6px;}
.header-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.badge-driver{background:var(--primary-light);color:var(--primary);}
.badge-admin{background:var(--admin-light);color:var(--admin);}
.header-date{font-size:11px;color:var(--gray-400);}
.header-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.hbtn{font-size:11px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:6px;padding:5px 9px;cursor:pointer;color:var(--gray-600);white-space:nowrap;}
.hbtn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);font-weight:700;}
.hbtn.admin-active{background:var(--admin-light);border-color:var(--admin);color:var(--admin);font-weight:700;}
.logout-btn{font-size:11px;background:var(--danger-light);border:1px solid #FCA5A5;border-radius:6px;padding:5px 9px;cursor:pointer;color:var(--danger);}

/* 탭 */
.day-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-600);}
.day-tab.active{background:var(--primary);border-color:var(--primary);color:white;}

/* 차량 탭 */
.car-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:10px 16px 0;}
.car-tabs::-webkit-scrollbar{display:none;}
.car-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-600);}
.car-tab.active{background:var(--primary);border-color:var(--primary);color:white;}

/* 카드 */
.student-card{background:white;border-radius:var(--radius);padding:13px 15px;margin-bottom:8px;border:1.5px solid var(--gray-200);}
.student-card.son{border-color:var(--primary);background:var(--primary-light);}
.student-card.soff{opacity:0.42;}
.card-row{display:flex;align-items:center;gap:9px;}
.card-order{width:26px;height:26px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray-600);flex-shrink:0;}
.son .card-order{background:var(--primary);color:white;}
.card-name{font-size:14px;font-weight:700;flex:1;}
.card-location{font-size:12px;color:var(--gray-600);margin-top:2px;}
.card-note{font-size:11px;color:var(--warning);margin-top:3px;padding-left:35px;}
.card-eta{font-size:11px;color:var(--success);margin-top:2px;padding-left:35px;font-weight:600;}
.toggle-btn{width:36px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;flex-shrink:0;}
.toggle-btn.on{background:var(--success);}
.toggle-btn.off{background:var(--gray-200);}
.toggle-btn::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:3px;transition:left 0.2s;}
.toggle-btn.on::after{left:17px;}
.toggle-btn.off::after{left:3px;}

/* 요약 */
.summary-bar{background:white;margin:10px 16px;border-radius:var(--radius);padding:12px 16px;border:1px solid var(--gray-200);display:flex;}
.summary-item{flex:1;text-align:center;border-right:1px solid var(--gray-200);}
.summary-item:last-child{border-right:none;}
.summary-num{font-size:19px;font-weight:800;color:var(--primary);}
.summary-label{font-size:10px;color:var(--gray-400);margin-top:2px;}

/* 경로 미리보기 */
.route-preview{background:white;margin:0 16px 8px;border-radius:var(--radius);border:1.5px solid var(--primary);overflow:hidden;}
.route-header{background:var(--primary-light);padding:9px 15px;font-size:12px;font-weight:700;color:var(--primary);display:flex;justify-content:space-between;align-items:center;}
.route-stop{padding:8px 15px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:9px;}
.route-stop:last-child{border-bottom:none;}
.stop-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;}
.stop-dot.dest{background:var(--danger);}
.stop-name{font-size:12px;color:var(--gray-700);flex:1;}
.stop-eta-badge{font-size:11px;color:var(--success);font-weight:700;white-space:nowrap;}

/* 하단 버튼 */
.bottom-action{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray-200);padding:10px 14px;display:flex;gap:8px;z-index:100;}
.btn-tmap{flex:1;padding:13px;border-radius:var(--radius);border:none;font-size:14px;font-weight:700;cursor:pointer;background:#1C6EFE;color:white;}
.btn-optimize{padding:13px 11px;border-radius:var(--radius);border:1.5px solid var(--primary);background:white;color:var(--primary);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-optimize.loading{opacity:0.6;pointer-events:none;}
.btn-share{padding:13px 11px;border-radius:var(--radius);border:1.5px solid var(--success);background:white;color:var(--success);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

.section{padding:10px 16px 0;}
.section-label{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:0.5px;margin-bottom:8px;}

/* 관리자 화면 */
.admin-screen{display:none;padding:0 0 20px;}
.admin-screen.show{display:block;}
.admin-nav{display:flex;gap:0;background:white;border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;}
.admin-nav::-webkit-scrollbar{display:none;}
.admin-nav-btn{flex-shrink:0;padding:11px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--gray-600);border-bottom:2px solid transparent;}
.admin-nav-btn.active{color:var(--admin);border-bottom-color:var(--admin);font-weight:700;}

/* 통계 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.stat-card{background:white;border-radius:var(--radius);padding:14px;border:1px solid var(--gray-200);}
.stat-num{font-size:26px;font-weight:800;color:var(--admin);}
.stat-label{font-size:11px;color:var(--gray-400);margin-top:3px;}
.stat-sub{font-size:10px;color:var(--gray-600);margin-top:5px;}
.status-card{background:white;border-radius:var(--radius);margin:0 16px 10px;padding:13px 15px;border:1px solid var(--gray-200);}
.status-card-title{font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.progress-bar{background:var(--gray-100);border-radius:10px;height:7px;overflow:hidden;margin-bottom:5px;}
.progress-fill{height:100%;border-radius:10px;background:var(--primary);}
.progress-fill.admin{background:var(--admin);}

/* 회원관리 */
.member-screen{display:none;padding:0 0 16px;}
.member-screen.show{display:block;}
.search-bar{display:flex;gap:8px;padding:12px 16px 8px;}
.search-input{flex:1;padding:9px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;outline:none;background:white;}
.search-input:focus{border-color:var(--primary);}
.filter-btn{padding:9px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--gray-200);background:white;font-size:12px;font-weight:500;cursor:pointer;color:var(--gray-600);white-space:nowrap;}
.filter-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
.filter-chips{display:flex;gap:5px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-600);}
.chip.on{background:var(--primary);border-color:var(--primary);color:white;}
.member-card{background:white;border-radius:var(--radius);padding:13px 15px;margin:0 16px 8px;border:1.5px solid var(--gray-200);}
.member-header{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.member-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;}
.member-name{font-size:14px;font-weight:700;}
.member-class{font-size:11px;color:var(--gray-400);margin-top:1px;}
.member-edit-btn{margin-left:auto;padding:4px 11px;border:1px solid var(--gray-200);border-radius:6px;font-size:11px;cursor:pointer;background:white;color:var(--gray-600);}
.member-info{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px;}
.info-row{display:flex;flex-direction:column;gap:1px;}
.info-label{color:var(--gray-400);font-size:10px;}
.info-val{color:var(--gray-700);font-weight:500;}
.member-note{margin-top:7px;padding:7px 9px;background:var(--warning-light);border-radius:6px;font-size:11px;color:#92400E;}
.days-row{display:flex;gap:3px;margin-top:6px;}
.day-dot{width:22px;height:22px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gray-400);}
.day-dot.on{background:var(--primary);color:white;}
.car-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--success-light);color:var(--success);margin-top:5px;}
.add-member-btn{margin:0 16px;padding:13px;border-radius:var(--radius);border:2px dashed var(--gray-200);background:white;width:calc(100% - 32px);font-size:13px;font-weight:600;color:var(--gray-400);cursor:pointer;}

/* 설정 */
.setting-section{padding:12px 16px 0;}
.setting-title{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:0.5px;margin-bottom:8px;}
.setting-card{background:white;border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;margin-bottom:12px;}
.setting-row{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--gray-100);gap:10px;}
.setting-row:last-child{border-bottom:none;}
.setting-row-label{flex:1;font-size:13px;font-weight:500;}
.setting-row-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
.setting-input{padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;outline:none;}
.setting-input:focus{border-color:var(--admin);}
.setting-save-btn{padding:7px 13px;background:var(--admin);color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}

/* 엑셀 업로드 */
.upload-area{margin:0 16px 12px;border:2px dashed var(--gray-200);border-radius:var(--radius);background:white;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
.upload-area:hover,.upload-area.drag{border-color:var(--primary);}
.upload-icon{font-size:32px;margin-bottom:8px;}
.upload-title{font-size:14px;font-weight:600;color:var(--gray-700);margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--gray-400);}
.upload-input{display:none;}
.upload-result{margin:0 16px 12px;background:var(--success-light);border:1px solid #6CE9A6;border-radius:var(--radius-sm);padding:12px 15px;font-size:12px;color:#027A48;display:none;}

/* 학부모 공유 */
.share-panel{background:white;border-radius:var(--radius);margin:0 16px 10px;padding:14px 15px;border:1.5px solid var(--success);}
.share-title{font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:10px;}
.share-link-box{background:var(--gray-100);border-radius:var(--radius-sm);padding:9px 12px;font-size:11px;color:var(--gray-600);word-break:break-all;margin-bottom:8px;}
.share-btns{display:flex;gap:6px;}
.share-btn{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;font-size:12px;font-weight:600;cursor:pointer;}
.share-btn-kakao{background:#FEE500;color:#3A1D1D;}
.share-btn-copy{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200);}
.share-btn-sms{background:var(--success);color:white;}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--gray-400);margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;outline:none;margin-bottom:10px;}
.form-input:focus{border-color:var(--primary);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.day-checks{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.day-check{display:flex;align-items:center;gap:3px;}
.day-check input{width:15px;height:15px;accent-color:var(--primary);}
.day-check label{font-size:12px;color:var(--gray-700);cursor:pointer;}
.modal-save{width:100%;padding:13px;background:var(--primary);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}

function loginAdmin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw!==ADMIN_PW){document.getElementById('login-err').style.display='block';return;}
  currentMode='admin';document.getElementById('login-screen').classList.add('hide');document.getElementById('main-app').style.display='block';initApp();
}
function logout(){currentMode='';document.getElementById('login-screen').classList.remove('hide');document.getElementById('main-app').style.display='none';document.getElementById('admin-pw').value='';document.getElementById('login-err').style.display='none';}

function initApp(){
  orgSettings=loadOrgSettings();courses=loadCourses();cars=loadCars();
  document.getElementById('today-date').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${['일','월','화','수','목','금','토'][now.getDay()]})`;
  document.getElementById('org-name-display').textContent=orgSettings.name;
  document.getElementById('org-icon').textContent=orgSettings.icon;
  const badge=document.getElementById('mode-badge');
  const header=document.getElementById('main-header');
  if(currentMode==='driver'){badge.textContent='운전자';badge.className='header-badge badge-driver';header.classList.remove('admin-mode');}
  else{badge.textContent='관리자';badge.className='header-badge badge-admin';header.classList.add('admin-mode');}

  const btns=document.getElementById('header-btns');
  if(currentMode==='driver'){
    btns.innerHTML=`<button class="hbtn active" id="tab-drive" onclick="switchTab('drive')">🚐 운행</button>

  } else {
    btns.innerHTML=`<button class="hbtn admin-active" id="tab-drive" onclick="switchTab('drive')">🚐 운행</button>
      <button class="hbtn" id="tab-admin" onclick="switchTab('admin')">👨‍💼 관리</button>
      <button class="logout-btn" onclick="logout()">나가기</button>`;
  }

  const tabsEl=document.getElementById('day-tabs');tabsEl.innerHTML='';
  DAYS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='day-tab'+(d===currentDay?' active':'');
    btn.textContent=DAY_NAMES[i];
    btn.onclick=()=>{currentDay=d;optimizedOrder=null;etaMap={};renderByTab();updateTabs();};
    tabsEl.appendChild(btn);
  });
  switchTab('drive');
}

function updateTabs(){document.querySelectorAll('.day-tab').forEach((b,i)=>b.classList.toggle('active',DAYS[i]===currentDay));}

function switchTab(tab){

// ── T맵 최적화 ──
async function optimizeRoute(){
  const active=getActiveStudents();
  if(active.length<2){alert('탑승 이용자가 2명 이상이어야 합니다.');return;}
  const btn=document.getElementById('optimize-btn');btn.textContent='⏳ 최적화 중...';btn.classList.add('loading');
  try{
    const res=await fetch('https://apis.openapi.sk.com/tmap/routes/optimized-order?version=1&format=json',{
      method:'POST',headers:{'Content-Type':'application/json','appKey':TMAP_KEY},
      body:JSON.stringify({reqCoordType:'WGS84GEO',resCoordType:'WGS84GEO',
        startX:String(orgSettings.destLon),startY:String(orgSettings.destLat),startName:orgSettings.destName+'(출발)',
        endX:String(orgSettings.destLon),endY:String(orgSettings.destLat),endName:orgSettings.destName,
        viaPoints:active.map((s,i)=>({viaPointId:`p${i}`,viaPointName:s.name,viaX:String(s.lon),viaY:String(s.lat)}))})
    });
    const data=await res.json();
    if(data.properties){
      const order=data.properties.optimalOrder||[];
      optimizedOrder=order.length>0?order.map(i=>active[i]):active;
      const totalSec=data.properties.totalTime||0;
      const course=courses.find(c=>c.id===currentCourseId);
      const [h,m]=course.depart.split(':').map(Number);
      optimizedOrder.forEach((s,i)=>{const mins=h*60+m+Math.round((i+1)*totalSec/active.length/60);etaMap[s.id]=`${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;});
      renderDrive();showStatus('✅ T맵 실시간 교통 반영 최적화 완료!','success');
    } else throw new Error();
  } catch(e){
    optimizedOrder=nearestNeighbor(active);renderDrive();showStatus('✅ 거리 기반 경로 최적화 완료','warn');
  }
  btn.textContent='🔀 최적화';btn.classList.remove('loading');
}

function nearestNeighbor(students){
  if(students.length<=1)return students;
  let unvisited=[...students],cur={lat:orgSettings.destLat,lon:orgSettings.destLon},result=[];
  while(unvisited.length>0){let near=unvisited.reduce((p,c)=>dist(cur,c)<dist(cur,p)?c:p);result.push(near);cur=near;unvisited=unvisited.filter(s=>s.id!==near.id);}
  return result;
}
function dist(a,b){return Math.sqrt((a.lat-b.lat)**2+(a.lon-b.lon)**2);}

function showStatus(msg,type){
  document.querySelectorAll('.status-box').forEach(e=>e.remove());
  const el=document.createElement('div');el.className=`status-box status-${type}`;el.textContent=msg;
  const c=document.getElementById('app-content');if(c)c.insertBefore(el,c.firstChild);
  setTimeout(()=>el.remove(),5000);
}

function openTmap(){
  const active=getActiveStudents();if(active.length===0){alert('탑승 이용자를 선택해주세요.');return;}
  const ordered=optimizedOrder||active;
  let url=`tmap://route?goalname=${encodeURIComponent(orgSettings.destName)}&goalx=${orgSettings.destLon}&goaly=${orgSettings.destLat}&coordType=WGS84GEO`;
  ordered.slice(0,5).forEach((s,i)=>{url+=`&via${i+1}name=${encodeURIComponent(s.name)}&via${i+1}x=${s.lon}&via${i+1}y=${s.lat}`;});
  const f=document.createElement('iframe');f.style.display='none';f.src=url;document.body.appendChild(f);
  setTimeout(()=>{try{document.body.removeChild(f);}catch(e){}},1500);
  setTimeout(()=>{
    const go=confirm(`T맵으로 출발합니다!\n경유: ${ordered.slice(0,5).map(s=>s.name).join(' → ')}\n\nT맵 앱이 열리지 않으면 확인을 누르세요.`);
    if(go)window.open(`https://www.tmap.co.kr/tmap2/public/tmap.jsp?rGoName=${encodeURIComponent(orgSettings.destName)}&rGoX=${orgSettings.destLon}&rGoY=${orgSettings.destLat}`,'_blank');
  },800);
}

    ['이철수','3시30분반','행복아파트 101동','010-4444-5555','','월,화,수,목,금','1호차','경비실 앞'],
  ];

    ['보호자연락처','하이픈(-) 포함','010-1234-5678'],

}

function handleExcelFile(file){
  if(!file)return;
  const XLSX=window.XLSX;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const dataRows=rows.slice(1).filter(r=>r[0]);
      let added=0,skipped=0;
      dataRows.forEach(r=>{
        const name=String(r[0]||'').trim();
        const courseName=String(r[1]||'').trim();
        const location=String(r[2]||'').trim();
        const phone=String(r[3]||'').trim();
        const phone2=String(r[4]||'').trim();
        const daysRaw=String(r[5]||'월,화,수,목,금').trim();
        const carName=String(r[6]||'1호차').trim();
        const note=String(r[7]||'').trim();
        if(!name||!location){skipped++;return;}
        const course=courses.find(c=>c.name===courseName)||courses[0];
        const car=cars.find(c=>c.name===carName)||cars[0];
        const days=daysRaw.split(',').map(d=>d.trim()).filter(d=>DAYS.includes(d));
        if(members.find(m=>m.name===name)){skipped++;return;}
        members.push({id:nextId++,name,courseId:course?.id||'c1',carId:car?.id||'car1',location,lat:orgSettings.destLat,lon:orgSettings.destLon,phone,phone2,days:days.length?days:DAYS,note,on:true});
        added++;
      });
      saveMembers();
      const res=document.getElementById('upload-result');
      res.style.display='block';
      res.textContent=`✅ 업로드 완료! ${added}명 등록, ${skipped}명 건너뜀 (중복 또는 필수값 누락)`;
      setTimeout(()=>renderAdminTab('members'),1500);
    } catch(err){alert('파일을 읽는 중 오류가 발생했습니다.\n파일 형식을 확인해주세요.');}
  };
  reader.readAsBinaryString(file);
}

// ── 차량 관리 ──

    ${cars.map((car,i)=>{
      const carMembers=members.filter(m=>m.carId===car.id);

      return`

      <div class="status-card-title" style="margin-bottom:10px;">🚐 ${car.name} <span style="font-size:11px;color:var(--gray-400);">배정 ${carMembers.length}명</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        <input class="setting-input" style="flex:1;min-width:80px;" placeholder="기사명" value="${car.driver}" oninput="cars[${i}].driver=this.value"/>
        <input class="setting-input" style="flex:1;min-width:100px;" placeholder="연락처" value="${car.phone}" oninput="cars[${i}].phone=this.value" type="tel"/>
        <input class="setting-input" style="flex:1;min-width:90px;" placeholder="차량번호" value="${car.plate}" oninput="cars[${i}].plate=this.value"/>
      </div>

      <div style="font-size:11px;font-weight:700;color:var(--gray-600);margin-bottom:6px;">배정된 회원 (요일별 탑승 조정)</div>
      ${carMembers.length===0?`<div style="font-size:12px;color:var(--gray-400);padding:8px 0;">배정된 회원이 없습니다.</div>`:''}
      ${carMembers.map(m=>`
        <div style="background:var(--gray-100);border-radius:8px;padding:9px 11px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:13px;font-weight:700;color:var(--gray-900);">${m.name}</span>
            <div style="display:flex;gap:4px;align-items:center;">
              <span style="font-size:10px;color:var(--gray-400);">${courses.find(c=>c.id===m.courseId)?.name||''}</span>
              <button onclick="removeMemberFromCar(${m.id})" style="padding:2px 8px;border:1px solid var(--danger);border-radius:5px;font-size:10px;color:var(--danger);background:white;cursor:pointer;">해제</button>
            </div>
          </div>
          <div style="font-size:10px;color:var(--gray-400);margin-bottom:5px;">${m.location}</div>
          <div style="display:flex;gap:4px;">
            ${DAYS.map(d=>`<button onclick="toggleMemberDay(${m.id},'${d}')" style="width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:11px;font-weight:700;
              background:${m.days.includes(d)?'#EA580C':'var(--gray-200)'};
              color:${m.days.includes(d)?'white':'var(--gray-400)'};">${d}</button>`).join('')}
          </div>
        </div>`).join('')}

      <div style="font-size:11px;font-weight:700;color:var(--gray-600);margin:10px 0 6px;">회원 추가</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${unassigned.map(m=>`<button onclick="assignMemberToCar(${m.id},'${car.id}')" style="padding:5px 10px;border:1px solid #FB923C;border-radius:20px;font-size:11px;color:#EA580C;background:white;cursor:pointer;">${m.name} +</button>`).join('')||'<span style="font-size:11px;color:var(--gray-400);">미배정 회원 없음</span>'}
      </div>
    </div>`;
    }).join('')}
    <button onclick="saveCars(cars);saveMembers();renderAdminTab('cars');alert('✅ 저장되었습니다.')" style="width:100%;padding:12px;background:var(--admin);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;">전체 저장</button>
  </div>`;
}

function toggleMemberDay(memberId, day){
  const m=members.find(m=>m.id===memberId);
  if(!m)return;
  if(m.days.includes(day)) m.days=m.days.filter(d=>d!==day);
  else m.days=[...m.days,day].sort((a,b)=>['월','화','수','목','금'].indexOf(a)-['월','화','수','목','금'].indexOf(b));
  saveMembers();
  renderAdminTab('cars');
}

function assignMemberToCar(memberId, carId){
  const m=members.find(m=>m.id===memberId);
  if(!m)return;
  m.carId=carId;
  saveMembers();
  renderAdminTab('cars');
}

function removeMemberFromCar(memberId){
  const m=members.find(m=>m.id===memberId);
  if(!m)return;
  if(!confirm(`'${m.name}'을 이 차량에서 해제하시겠습니까?`))return;
  m.carId='';
  saveMembers();
  renderAdminTab('cars');
}

function addCourse(){
  const name=document.getElementById('new-course-name').value.trim();
  if(!name)return;
  courses.push({id:'c'+Date.now(),name,depart:'09:00',arrive:'09:30'});
  renderAdminTab('schedule');
}
function deleteCourse(i){
  if(!confirm(`'${courses[i].name}' 코스를 삭제하시겠습니까?`))return;
  courses.splice(i,1);renderAdminTab('schedule');
}

function changePassword(){const p1=document.getElementById('new-pw').value,p2=document.getElementById('new-pw2').value;if(!p1){alert('비밀번호를 입력해주세요.');return;}if(p1!==p2){alert('비밀번호가 일치하지 않습니다.');return;}ADMIN_PW=p1;localStorage.setItem('tkd_adminpw',ADMIN_PW);alert('✅ 변경되었습니다.');}
function saveApiKeyFromSettings(){TMAP_KEY=document.getElementById('tmap-key-input').value.trim();localStorage.setItem('tmapKey',TMAP_KEY);alert('✅ 저장되었습니다.');}
function resetData(){if(!confirm('모든 이용자 데이터를 초기화하시겠습니까?'))return;localStorage.removeItem('tkd_members');members=loadMembers();alert('초기화되었습니다.');renderAdminTab('settings');}

// ── 회원관리 (운전자용) ──
function renderMembers(){
  const query=document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('filter-chips').innerHTML=`<button class="chip ${filterCourse===''?'on':''}" onclick="filterCourse='';renderMembers()">전체</button>`+
    courses.map(c=>`<button class="chip ${filterCourse===c.id?'on':''}" onclick="filterCourse='${c.id}';renderMembers()">${c.name}</button>`).join('')+
    cars.map(c=>`<button class="chip ${filterCar===c.id?'on':''}" onclick="filterCar='${c.id}';renderMembers()">${c.name}</button>`).join('');
  document.getElementById('filter-riding-btn').classList.toggle('active',filterRiding);
  let filtered=members.filter(m=>{
    if(query&&!m.name.toLowerCase().includes(query))return false;
    if(filterRiding&&!m.on)return false;
    if(filterCourse&&m.courseId!==filterCourse)return false;
    if(filterCar&&m.carId!==filterCar)return false;
    return true;
  });
  const listEl=document.getElementById('member-list');
  if(filtered.length===0){listEl.innerHTML=`<div class="empty-state">검색 결과가 없습니다.</div>`;return;}
  listEl.innerHTML=filtered.map(m=>{
    const course=courses.find(c=>c.id===m.courseId);const car=cars.find(c=>c.id===m.carId);
    return`<div class="member-card">
      <div class="member-header">
        <div class="member-avatar">${m.name.slice(0,1)}</div>
        <div><div class="member-name">${m.name}</div><div class="member-class">${course?.name||'–'}</div></div>
        ${currentMode==='admin'?`<button class="member-edit-btn" onclick="openEditModal(${m.id})">수정</button>`:''}
      </div>
      <div class="member-info">
        <div class="info-row"><span class="info-label">픽업 장소</span><span class="info-val">${m.location}</span></div>
        <div class="info-row"><span class="info-label">연락처</span><span class="info-val">${m.phone||'–'}</span></div>
        ${m.phone2?`<div class="info-row"><span class="info-label">연락처2</span><span class="info-val">${m.phone2}</span></div>`:''}
      </div>
      <div class="days-row">${DAYS.map(d=>`<div class="day-dot ${m.days.includes(d)?'on':''}">${d}</div>`).join('')}</div>
      <span class="car-badge">🚐 ${car?.name||'미배정'}</span>
      ${m.note?`<div class="member-note">※ ${m.note}</div>`:''}
    </div>`;
  }).join('');
}
function toggleRidingFilter(){filterRiding=!filterRiding;renderMembers();}

// ── 원생 등록/수정 ──
function populateSelects(){
  const cs=document.getElementById('m-class');const cv=document.getElementById('m-car');
  cs.innerHTML=courses.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  cv.innerHTML=cars.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function openAddModal(){
  populateSelects();
  document.getElementById('modal-title').textContent='이용자 등록';
  document.getElementById('edit-id').value='';
  ['m-name','m-phone','m-phone2','m-location','m-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-class').value=courses[0]?.id||'';
  document.getElementById('m-car').value=cars[0]?.id||'';
  Object.values(dayIdMap).forEach(d=>document.getElementById('d-'+d).checked=false);
  document.getElementById('modal-del-btn').style.display='none';
  document.getElementById('member-modal').classList.add('show');
}
function openEditModal(id){
  populateSelects();
  const m=members.find(m=>m.id===id);if(!m)return;
  document.getElementById('modal-title').textContent='이용자 정보 수정';
  document.getElementById('edit-id').value=id;
  document.getElementById('m-name').value=m.name;
  document.getElementById('m-class').value=m.courseId;
  document.getElementById('m-car').value=m.carId;
  document.getElementById('m-phone').value=m.phone;
  document.getElementById('m-phone2').value=m.phone2||'';
  document.getElementById('m-location').value=m.location;
  document.getElementById('m-note').value=m.note;
  DAYS.forEach(d=>document.getElementById('d-'+dayIdMap[d]).checked=m.days.includes(d));
  document.getElementById('modal-del-btn').style.display='block';
  document.getElementById('member-modal').classList.add('show');
}
function saveMember(){
  const name=document.getElementById('m-name').value.trim();
  const location=document.getElementById('m-location').value.trim();
  if(!name||!location){alert('이름과 픽업 장소는 필수입니다.');return;}
  const days=DAYS.filter(d=>document.getElementById('d-'+dayIdMap[d]).checked);
  if(days.length===0){alert('등원 요일을 하나 이상 선택해주세요.');return;}
  const editId=document.getElementById('edit-id').value;
  const obj={name,courseId:document.getElementById('m-class').value,carId:document.getElementById('m-car').value,phone:document.getElementById('m-phone').value.trim(),phone2:document.getElementById('m-phone2').value.trim(),location,days,note:document.getElementById('m-note').value.trim(),lat:orgSettings.destLat,lon:orgSettings.destLon};
  if(editId){const idx=members.findIndex(m=>m.id===parseInt(editId));members[idx]={...members[idx],...obj};}
  else members.push({id:nextId++,...obj,on:true});
  saveMembers();closeModal('member-modal');
  if(currentTab==='member')renderMembers();else renderAdminTab('members');
}
function deleteMember(){
  const editId=parseInt(document.getElementById('edit-id').value);
  if(!confirm('정말 삭제하시겠습니까?'))return;
  members=members.filter(m=>m.id!==editId);saveMembers();closeModal('member-modal');
  if(currentTab==='member')renderMembers();else renderAdminTab('members');
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-bg').forEach(el=>el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');}));
</script>
